# Configuration for fibocom-l850-gnome-lte.
# Plain KEY=value, sourced by /usr/local/bin/fibocom-l850-up.

# APN for your SIM card. This is the ONE setting most people need to change.
# See the README for a table of common providers, or ask your carrier.
# You can also change it from the GNOME extension preferences.
APN=internet

# Optional DNS servers to register on the wwan0 interface, space-separated.
# Leave empty to rely on whatever the network provides. Some carriers do not
# push usable DNS over this modem, in which case set your carrier's resolvers
# or a public one (e.g. 1.1.1.1 9.9.9.9).
DNS=

# Default-route metric for the LTE link. Higher = lower priority. Keep this
# above your Wi-Fi metric (typically 600) so LTE acts as a fallback only.
METRIC=1000

# Path to your xmm7360-pci checkout (the folder containing rpc/).
# The installer sets this for you; change it if you move the driver.
XMM7360_DIR=/opt/xmm7360-pci
